function renderConfGauge(score) {
  const r = 30, circ = 2 * Math.PI * r;
  const off = circ - (score / 100) * circ;
  return `<div class="conf-gauge">
    <svg viewBox="0 0 72 72"><circle cx="36" cy="36" r="${r}" fill="none" stroke="#eee" stroke-width="5"/>
    <circle cx="36" cy="36" r="${r}" fill="none" stroke="#1a7a3a" stroke-width="5" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round"/></svg>
    <div class="conf-gauge-num">${score}</div></div>`;
}

function renderMetrics(metrics) {
  return metrics.map(m => {
    const ic = m.icon === "pass" ? "\u2713" : m.icon === "pending" ? "\u25CB" : "\u2014";
    return `<div class="m-row"><span class="m-icon ${m.icon}">${ic}</span><span class="m-label">${m.label}</span><span class="m-val">${m.value}</span><span class="m-verdict">${m.verdict}</span></div>`;
  }).join('');
}

function renderPricing(c) {
  if (c.bonus) {
    return `<div class="price-row">
      <div class="price-box list" style="flex:1;background:#fdf4e8"><div class="price-box-label" style="color:#b8860b">Included Free</div><div class="price-box-val">$0</div></div>
      <div class="price-box expected"><div class="price-box-label">Retail Value</div><div class="price-box-val">$245</div></div>
    </div>`;
  }
  return `<div class="price-row">
    <div class="price-box list"><div class="price-box-label">List Price</div><div class="price-box-val">$${n(c.listPrice)}</div></div>
    <div class="price-box expected"><div class="price-box-label">Expected Sale</div><div class="price-box-val">$${n(c.expectedSale)}</div></div>
    <div class="price-box floor"><div class="price-box-label">Floor Price</div><div class="price-box-val">$${n(c.floorPrice)}</div></div>
  </div>`;
}

function renderCard(comp, idx) {
  const open = expandedIdx === idx;
  const scoreCls = comp.bonus ? "bonus" : (comp.rating === "EXCELLENT" ? "excellent" : "very-good");
  const badge = comp.bonus
    ? `<span class="bonus-dot">\u2605 BONUS</span>`
    : `<span class="verified-dot">\u2713 Verified</span>`;
  const priceDisplay = comp.bonus
    ? `<div class="comp-ask-price" style="color:#b8860b">FREE</div><div class="comp-floor-price">$245 value</div>`
    : `<div class="comp-ask-price">$${n(comp.listPrice)}</div><div class="comp-floor-price">Floor $${n(comp.floorPrice)}</div>`;
  return `<div class="comp ${open ? 'expanded' : ''}" data-idx="${idx}">
    <div class="comp-head" onclick="toggle(${idx})">
      <div class="comp-score ${scoreCls}">${comp.confidence}</div>
      <div class="comp-mid">
        <div class="comp-title">${comp.name} ${badge}</div>
        <div class="comp-subtitle">${comp.model}</div>
      </div>
      <div class="comp-pricing">${priceDisplay}</div>
      <span class="comp-arrow ${open ? 'open' : ''}">\u25BC</span>
    </div>
    <div class="comp-body">
      <div class="metrics">${renderMetrics(comp.metrics)}</div>
      ${renderPricing(comp)}
      <div class="note-block"><div class="note-label">Inspector's Summary</div><div class="note-text">${comp.notes}</div></div>
    </div>
  </div>`;
}
