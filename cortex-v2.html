<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CORTEX">
    <meta name="theme-color" content="#08090d">
    <meta name="description" content="JARVIS AI Infrastructure Cockpit — Real-time system monitoring and orchestration">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <title>CORTEX v2.0</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #08090d;
            --bg-card: #0c0e14;
            --bg-card-hover: #11131a;
            --bg-elevated: #0f1117;
            --bg-code: #060810;
            --gold: #ffb86a;
            --gold-soft: #ffc978;
            --gold-dim: rgba(255,184,106,0.10);
            --gold-glow: rgba(255,184,106,0.15);
            --gold-strong: rgba(255,184,106,0.28);
            --core-white: #fff4db;
            --core-warm: #ffd7a3;
            --blue-ghost: #3d5060;
            --blue-ghost-dim: rgba(61,80,96,0.08);
            --blue-faint: rgba(80,110,130,0.06);
            --green: #5ce0a0;
            --green-dim: rgba(92,224,160,0.08);
            --red: #f06060;
            --red-dim: rgba(240,96,96,0.06);
            --yellow: #f0d060;
            --yellow-dim: rgba(240,208,96,0.08);
            --text: #b8bfc8;
            --text-bright: #dce0e6;
            --text-dim: #5a6370;
            --text-faint: #3a4250;
            --border: rgba(255,255,255,0.05);
            --border-gold: rgba(255,184,106,0.10);
            --border-subtle: rgba(255,255,255,0.03);
            --radius: 8px;
            --shadow: 0 2px 20px rgba(0,0,0,0.3);
            --shadow-glow: 0 0 30px rgba(255,184,106,0.04);
            --font-display: 'Orbitron', monospace;
            --font-body: 'Rajdhani', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        html {
            background: var(--bg);
            color: var(--text);
        }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 1200px;
            height: 800px;
            background: radial-gradient(ellipse 900px 600px at center, rgba(255,184,106,0.08) 0%, rgba(255,184,106,0.02) 40%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        /* TOP BAR */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: max(12px, env(safe-area-inset-top)) 16px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            height: 56px;
            flex-shrink: 0;
            position: relative;
            z-index: 100;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .arc-reactor-icon {
            width: 28px;
            height: 28px;
        }

        .top-bar-title {
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 700;
            color: var(--core-white);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .demo-badge {
            display: inline-block;
            background: var(--gold-dim);
            color: var(--gold);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-left: 6px;
            opacity: 1;
            transition: opacity 3s ease-out;
        }

        .demo-badge.fade {
            opacity: 0;
            pointer-events: none;
        }

        .top-bar-center {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse-dot 2s infinite;
        }

        .status-dot.offline {
            background: var(--red);
            animation: none;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .status-text {
            font-size: 11px;
            color: var(--text-dim);
            font-weight: 500;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            justify-content: flex-end;
        }

        .timestamp {
            font-size: 10px;
            color: var(--text-faint);
            font-family: var(--font-code);
        }

        .settings-button {
            width: 24px;
            height: 24px;
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .settings-button:active {
            color: var(--gold);
        }

        /* HERO RING */
        .hero-container {
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .ring-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
        }

        .ring-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(var(--shadow-glow));
        }

        .ring-center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
        }

        .ring-number {
            font-family: var(--font-display);
            font-size: 36px;
            font-weight: 800;
            color: var(--core-white);
            line-height: 1;
        }

        .ring-label {
            font-family: var(--font-body);
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 6px;
        }

        .stat-pills {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
        }

        .stat-pill {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 11px;
            color: var(--text-dim);
            font-weight: 500;
            font-family: var(--font-body);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .stat-pill strong {
            color: var(--core-warm);
            font-weight: 600;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .tab-content {
            display: none;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        .content-scroll {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .content-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .content-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .content-scroll::-webkit-scrollbar-thumb {
            background: var(--blue-ghost-dim);
            border-radius: 2px;
        }

        /* TAB CONTENT PADDING */
        .tab-content > div {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* BOTTOM TAB NAVIGATION */
        .bottom-tabs {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: max(56px, calc(56px + env(safe-area-inset-bottom)));
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .tab-button {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-dim);
            font-family: var(--font-body);
            font-size: 9px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-button.active {
            color: var(--gold);
        }

        .tab-button.active::before {
            content: '';
            position: absolute;
            top: 8px;
            width: 20px;
            height: 24px;
            background: var(--gold-dim);
            border-radius: 4px;
            z-index: -1;
        }

        .tab-icon {
            font-size: 18px;
        }

        /* CARDS */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            transition: all 0.2s;
        }

        .card:active {
            transform: scale(0.98);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .card-title-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .service-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .service-dot.online {
            background: var(--green);
            animation: pulse-dot 2s infinite;
        }

        .service-dot.offline {
            background: var(--red);
        }

        .service-dot.degraded {
            background: var(--yellow);
            animation: pulse-dot 2s infinite;
        }

        .card-title {
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 600;
            color: var(--core-white);
            line-height: 1.2;
            text-transform: uppercase;
        }

        .card-subtitle {
            font-size: 11px;
            color: var(--text-dim);
            font-weight: 400;
        }

        .card-chevron {
            color: var(--text-faint);
            font-size: 18px;
            transition: transform 0.3s;
        }

        .card.expanded .card-chevron {
            transform: rotate(90deg);
        }

        .card-content {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.3s ease, opacity 0.3s ease;
            margin-top: 0;
        }

        .card.expanded .card-content {
            max-height: 1000px;
            opacity: 1;
            margin-top: 12px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 16px;
            font-size: 12px;
        }

        .card-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .card-label {
            font-family: var(--font-body);
            font-size: 9px;
            color: var(--text-faint);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .card-value {
            font-family: var(--font-code);
            font-size: 13px;
            color: var(--core-warm);
            font-weight: 500;
        }

        .card-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            background: var(--gold-dim);
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-badge.green {
            background: var(--green-dim);
            color: var(--green);
        }

        .card-badge.red {
            background: var(--red-dim);
            color: var(--red);
        }

        .card-badge.yellow {
            background: var(--yellow-dim);
            color: var(--yellow);
        }

        /* WORKFLOWS */
        .workflow-summary {
            background: var(--bg-elevated);
            border: 1px solid var(--border-gold);
            border-radius: var(--radius);
            padding: 12px 16px;
            font-size: 12px;
            color: var(--core-warm);
            font-family: var(--font-code);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .workflow-row {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
            cursor: pointer;
            transition: all 0.2s;
        }

        .workflow-row:active {
            transform: scale(0.98);
        }

        .workflow-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .workflow-info {
            flex: 1;
            min-width: 0;
        }

        .workflow-name {
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: 600;
            color: var(--core-white);
            margin-bottom: 2px;
        }

        .workflow-schedule {
            font-size: 11px;
            color: var(--text-dim);
        }

        .workflow-timestamp {
            font-size: 10px;
            color: var(--text-faint);
            margin-top: 2px;
        }

        .workflow-detail {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.3s ease, opacity 0.3s ease;
            margin-top: 0;
        }

        .workflow-row.expanded .workflow-detail {
            max-height: 300px;
            opacity: 1;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .workflow-detail-item {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 11px;
        }

        .workflow-detail-label {
            color: var(--text-faint);
            min-width: 50px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .workflow-detail-value {
            color: var(--core-warm);
            flex: 1;
        }

        /* CONTEXT TAB */
        .flow-diagram {
            background: var(--bg-elevated);
            border: 1px solid var(--border-gold);
            border-radius: var(--radius);
            padding: 12px;
            margin-bottom: 8px;
            font-size: 10px;
            color: var(--text-dim);
            font-family: var(--font-code);
            line-height: 1.8;
            overflow-x: auto;
            white-space: nowrap;
        }

        .flow-item {
            display: inline-block;
            background: var(--gold-dim);
            color: var(--gold);
            padding: 4px 8px;
            border-radius: 3px;
            margin: 0 4px;
        }

        .flow-arrow {
            display: inline-block;
            color: var(--text-faint);
            margin: 0 2px;
        }

        .context-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            margin-bottom: 8px;
        }

        .context-card-title {
            font-family: var(--font-display);
            font-size: 12px;
            font-weight: 700;
            color: var(--core-white);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .context-card-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 12px;
            font-size: 11px;
            margin-bottom: 8px;
        }

        .context-meta-item {
            display: flex;
            gap: 6px;
        }

        .context-meta-label {
            color: var(--text-faint);
            font-weight: 600;
        }

        .context-meta-value {
            color: var(--core-warm);
        }

        .context-progress {
            display: flex;
            gap: 6px;
            align-items: center;
            font-size: 11px;
            margin-top: 8px;
        }

        .context-bar {
            flex: 1;
            height: 8px;
            background: var(--bg-elevated);
            border-radius: 4px;
            overflow: hidden;
        }

        .context-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold) 0%, var(--gold-soft) 100%);
            border-radius: 4px;
        }

        .context-staleness {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            background: var(--green-dim);
            color: var(--green);
            margin-top: 6px;
        }

        .context-staleness.yellow {
            background: var(--yellow-dim);
            color: var(--yellow);
        }

        .context-staleness.red {
            background: var(--red-dim);
            color: var(--red);
        }

        .context-callout {
            background: var(--gold-dim);
            border-left: 3px solid var(--gold);
            padding: 8px 12px;
            margin-top: 8px;
            font-size: 11px;
            color: var(--core-warm);
            border-radius: 2px;
        }

        /* COST TAB */
        .cost-gauge-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 12px;
        }

        .cost-gauge-wrapper {
            position: relative;
            width: 160px;
            height: 100px;
        }

        .cost-gauge-svg {
            width: 100%;
            height: 100%;
        }

        .cost-gauge-label {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .cost-value {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 800;
            color: var(--core-white);
            margin: 8px 0;
        }

        .cost-section-title {
            font-family: var(--font-display);
            font-size: 12px;
            font-weight: 700;
            color: var(--core-white);
            text-transform: uppercase;
            margin: 12px 0 8px 0;
            letter-spacing: 1px;
        }

        .cost-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 11px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .cost-item:last-child {
            border-bottom: none;
        }

        .cost-item-label {
            color: var(--text);
        }

        .cost-item-value {
            font-family: var(--font-code);
            font-weight: 600;
            color: var(--core-warm);
        }

        .cost-bar-bg {
            height: 24px;
            background: var(--bg-elevated);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .cost-bar {
            height: 100%;
            background: var(--gold);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .cost-chart {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            align-items: flex-end;
            height: 80px;
            margin: 8px 0;
            padding: 8px;
            background: var(--bg-elevated);
            border-radius: var(--radius);
        }

        .cost-bar-chart {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .cost-bar-column {
            width: 100%;
            background: var(--gold);
            border-radius: 2px;
            transition: all 0.2s;
            min-height: 4px;
        }

        .cost-bar-label {
            font-size: 9px;
            color: var(--text-faint);
        }

        .alert-box {
            background: var(--red-dim);
            border-left: 3px solid var(--red);
            border-radius: 2px;
            padding: 12px;
            font-size: 11px;
            color: var(--text);
            margin-top: 8px;
            line-height: 1.6;
        }

        .alert-box strong {
            color: var(--red);
        }

        /* SECURITY TAB */
        .security-score {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 16px;
        }

        .security-score-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin-bottom: 12px;
        }

        .security-score-svg {
            width: 100%;
            height: 100%;
        }

        .security-score-text {
            font-family: var(--font-display);
            font-size: 32px;
            font-weight: 800;
            color: var(--core-white);
        }

        .threat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .threat-card:active {
            transform: scale(0.98);
        }

        .threat-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        .threat-title {
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: 600;
            color: var(--core-white);
            flex: 1;
        }

        .threat-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            background: var(--yellow-dim);
            color: var(--yellow);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .threat-detail {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.3s ease, opacity 0.3s ease;
        }

        .threat-card.expanded .threat-detail {
            max-height: 400px;
            opacity: 1;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .threat-detail-item {
            margin-bottom: 8px;
            font-size: 11px;
        }

        .threat-detail-label {
            color: var(--text-faint);
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .threat-detail-value {
            color: var(--text);
            line-height: 1.5;
        }

        .threat-model-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            margin-bottom: 8px;
        }

            padding: 4px 0;

            background: var(--bg);
            color: var(--text-dim);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-pill.active {
            background: var(--gold-dim);
            color: var(--core-warm);
            border-color: var(--border-gold);
        }

        .event-item {
            border-left: 3px solid var(--border);
            padding: 10px 12px;
            margin-bottom: 6px;
            font-size: 11px;
            background: var(--bg-card);
            border-radius: 2px;

            border-left-color: var(--green);
        }

        .event-item.error {
            border-left-color: var(--red);
        }

        .event-item.warning {
            border-left-color: var(--yellow);
        }

        .event-item.info {
            border-left-color: var(--gold);
        }

        .event-timestamp {
            font-family: var(--font-code);
            font-size: 10px;
            color: var(--text-faint);
        }

        .event-service {
            color: var(--core-warm);
            font-weight: 600;
        }

        .event-message {
            color: var(--text);
            margin-top: 2px;
        }

        /* FOOTER */
        .tab-footer {
            text-align: center;
            padding: 20px 16px 16px;
            border-top: 1px solid var(--border-subtle);
            font-size: 11px;
            color: var(--text-faint);
            font-family: var(--font-body);
            letter-spacing: 1px;
            line-height: 1.8;
        }

        /* SETTINGS PANEL */
        .settings-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 280px;
            height: 100%;
            background: var(--bg-card);
            border-left: 1px solid var(--border);
            z-index: 200;
            padding-top: 16px;
            overflow-y: auto;
            transition: right 0.3s ease;
            padding: max(16px, env(safe-area-inset-top)) 16px 16px;
        }

        .settings-panel.open {
            right: 0;
        }

        .settings-panel-title {
            font-family: var(--font-display);
            font-size: 12px;
            font-weight: 700;
            color: var(--core-white);
            text-transform: uppercase;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .settings-section {
            margin-bottom: 20px;
        }

        .settings-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .settings-input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--core-white);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: var(--font-code);
            font-size: 11px;
            margin-bottom: 8px;
        }

        .settings-input::placeholder {
            color: var(--text-faint);
        }

        .settings-pills {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .settings-pill {
            flex: 1;
            min-width: 50px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 8px 10px;
            border-radius: 4px;
            text-align: center;
            font-size: 10px;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .settings-pill.active {
            background: var(--gold-dim);
            color: var(--gold);
            border-color: var(--border-gold);
        }

        .settings-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .toggle-input {
            width: 32px;
            height: 18px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 9px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .toggle-input.on {
            background: var(--gold-dim);
            border-color: var(--border-gold);
        }

        .toggle-input::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background: var(--text-dim);
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: all 0.2s;
        }

        .toggle-input.on::after {
            background: var(--gold);
            left: 16px;
        }

        .settings-info {
            font-size: 10px;
            color: var(--text-dim);
            line-height: 1.5;
        }

        /* RESPONSIVE */

                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);

            const now = new Date();

            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('timestamp').textContent = `${hours}:${minutes}:${seconds}`;

        function animateRing() {
            const arc = document.getElementById('mainArc');
            const circumference = 2 * Math.PI * 75;
            const offset = circumference * (1 - (7 / 7));
            arc.style.transition = 'stroke-dashoffset 2s ease-out';
            arc.style.strokeDashoffset = offset;
        }

        // RENDER SERVICES
        function renderServices() {
            const container = document.querySelector('#servicesTab .content-scroll > div');
            container.innerHTML = APP_STATE.data.services.map((svc, idx) => {
                const isExpanded = APP_STATE.expandedService === idx;
                return `
                    <div class="card ${isExpanded ? 'expanded' : ''}" onclick="toggleServiceExpand(${idx})">
                        <div class="card-header">

            footer.className = 'tab-footer';
            footer.innerHTML = `JARVIS AI Infrastructure — Built by Philip Belue<br/>Midnight Design System v2 — CORTEX v2.0 — April 2026`;
            container.appendChild(footer);
        }

        // RENDER WORKFLOWS
        function renderWorkflows() {
            const container = document.querySelector('#workflowsTab .content-scroll > div');
            const firing = APP_STATE.data.workflows.filter(w => w.status === 'firing').length;
            const failing = APP_STATE.data.workflows.filter(w => w.status === 'failing').length;

            container.innerHTML = `
                <div class="workflow-summary">

        // PWA SETUP
        function setupPWA() {
            // Create and set manifest
            const manifest = {
                name: 'JARVIS CORTEX',
                short_name: 'CORTEX',
                description: 'JARVIS AI Infrastructure Cockpit',
                display: 'standalone',
                scope: '/',
                start_url: '/',
                background_color: '#08090d',
                theme_color: '#ffb86a',
                icons: []
            };

            // Generate apple-touch-icon via canvas
            try {
                const canvas = document.createElement('canvas');
                canvas.width = 180;
                canvas.height = 180;
                const ctx = canvas.getContext('2d');

                // Background
                ctx.fillStyle = '#08090d';
                ctx.beginPath();
                ctx.roundRect(0, 0, 180, 180, 40);
                ctx.fill();

                // Arc reactor icon
                const cx = 90, cy = 90;
                ctx.strokeStyle = '#ffb86a';
                ctx.lineWidth = 1;

                // Rings
                for (let r of [6, 14, 22, 30]) {
                    ctx.beginPath();
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // Tick marks
                ctx.lineWidth = 1.5;
                const angles = [0, Math.PI/3, Math.PI*2/3, Math.PI, Math.PI*4/3, Math.PI*5/3];
                angles.forEach(angle => {
                    const x1 = cx + 35 * Math.cos(angle);
                    const y1 = cy + 35 * Math.sin(angle);
                    const x2 = cx + 40 * Math.cos(angle);
                    const y2 = cy + 40 * Math.sin(angle);
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                });

                // Center dot
                ctx.fillStyle = '#ffb86a';
                ctx.beginPath();
                ctx.arc(cx, cy, 2, 0, Math.PI * 2);
                ctx.fill();

                // Convert to blob and create link
                canvas.toBlob(blob => {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('link');
                    link.rel = 'apple-touch-icon';
                    link.href = url;
                    document.head.appendChild(link);
                });
            } catch (e) {
                console.log('Canvas not available for icon generation');
            }

            // Set manifest
            const manifestUrl = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: 'application/json' }));
            const link = document.createElement('link');
            link.rel = 'manifest';
            link.href = manifestUrl;
            document.head.appendChild(link);
        }
